name: hermes-runtime

x-runtime-common: &runtime-common
  image: hermes-runtime:${RUNTIME_IMAGE_TAG:-dev}
  restart: unless-stopped
  networks: [runtime]
  read_only: true
  tmpfs: [/tmp]
  security_opt: [no-new-privileges:true]
  cap_drop: [ALL]
  environment: &runtime-environment
    TEMPORAL_ADDRESS: temporal:7233
    TEMPORAL_TASK_QUEUE: device-test
    DATABASE_URL: >-
      host=postgres port=5432 user=${RUNTIME_DB_USER:-hermes_runtime}
      password=${RUNTIME_DB_PASSWORD:?RUNTIME_DB_PASSWORD is required}
      dbname=hermes_runtime sslmode=disable

services:
  postgres:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE must come from images.lock.env}
    restart: unless-stopped
    networks: [runtime]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-temporal_admin}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD is required}
      RUNTIME_DB_USER: ${RUNTIME_DB_USER:-hermes_runtime}
      RUNTIME_DB_PASSWORD: ${RUNTIME_DB_PASSWORD:?RUNTIME_DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init/10-runtime-db.sh:/docker-entrypoint-initdb.d/10-runtime-db.sh:ro
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  temporal:
    image: ${TEMPORAL_IMAGE:?TEMPORAL_IMAGE must come from images.lock.env}
    restart: unless-stopped
    networks: [runtime]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-temporal_admin}
      POSTGRES_PWD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD is required}
      POSTGRES_SEEDS: postgres
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    healthcheck:
      # auto-setup binds the frontend to the container IP, not 127.0.0.1.
      test: [CMD-SHELL, "tctl --address \"$$(hostname -i):7233\" cluster health >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-ui:
    image: ${TEMPORAL_UI_IMAGE:?TEMPORAL_UI_IMAGE must come from images.lock.env}
    restart: unless-stopped
    networks: [runtime]
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${TEMPORAL_UI_HOST_PORT:-18080}
    ports:
      - "127.0.0.1:${TEMPORAL_UI_HOST_PORT:-18080}:8080"

  trigger:
    <<: *runtime-common
    build:
      context: ..
      dockerfile: runtime/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE:?GO_IMAGE must come from images.lock.env}
        RUNTIME_BASE_IMAGE: ${RUNTIME_BASE_IMAGE:?RUNTIME_BASE_IMAGE must come from images.lock.env}
    command: [/app/hermes-trigger]
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *runtime-environment
      TRIGGER_ADDR: :8090
      TRIGGER_WEBHOOK_SECRET: ${TRIGGER_WEBHOOK_SECRET:?TRIGGER_WEBHOOK_SECRET is required}
      TRIGGER_REFS: ${TRIGGER_REFS:-master}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-https://gitlab2.quectel.com}
      GITLAB_TOKEN: ${GITLAB_TOKEN:?GITLAB_TOKEN is required}
      GITLAB_TOKEN_HEADER: ${GITLAB_TOKEN_HEADER:-PRIVATE-TOKEN}
      PACKAGE_NAME: ${PACKAGE_NAME:-algo-super-sdk}
    ports:
      - "${TRIGGER_BIND_IP:-0.0.0.0}:${TRIGGER_HOST_PORT:-18090}:8090"
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8090/healthz]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  worker:
    <<: *runtime-common
    command: [/app/hermes-worker]
    depends_on:
      trigger:
        condition: service_healthy
    environment:
      <<: *runtime-environment
      WORKER_CALLBACKS_ADDR: :8091
      VARIANTS_CONFIG: /etc/hermes/variants.yaml
      DEVICE_WAIT_ROUNDS: ${DEVICE_WAIT_ROUNDS:-20}
      DEVICE_WAIT_SECONDS: ${DEVICE_WAIT_SECONDS:-30}
      CALLBACK_BASE_URL: ${CALLBACK_BASE_URL:-http://127.0.0.1:18091}
      ARTIFACT_AUTH_TYPE: ${ARTIFACT_AUTH_TYPE:-bearer}
      ARTIFACT_AUTH_TOKEN: ${ARTIFACT_AUTH_TOKEN:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      # §3.7 预签名直传;worker 不 depends_on minio——MinIO 缺失时优雅降级为空
      # presigned_uploads。签名覆盖 Host,故预签名 client 用 PUBLIC endpoint 构造。
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://127.0.0.1:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-evidence}
      MINIO_PRESIGN_TTL: ${MINIO_PRESIGN_TTL:-1h}
      # Phase 2 Analyzer(§12):复用 q-uat hermes-agent 平台(§4,宿主 8090,不在本
      # Compose 内);HERMES_ENDPOINT 为空 → Analyzer 禁用,verdict 由规则引擎保底。
      # 平台在宿主机上,容器内需填宿主 LAN 地址(如 http://<宿主IP>:8090/...)。
      HERMES_ENDPOINT: ${HERMES_ENDPOINT:-}
      HERMES_AUTH_TOKEN: ${HERMES_AUTH_TOKEN:-}
      HERMES_TIMEOUT_SEC: ${HERMES_TIMEOUT_SEC:-60}
      HERMES_MODEL: ${HERMES_MODEL:-}
    ports:
      - "${WORKER_CALLBACKS_BIND_IP:-0.0.0.0}:${WORKER_CALLBACKS_HOST_PORT:-18091}:8091"
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8091/healthz]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  minio:
    image: ${MINIO_IMAGE:?MINIO_IMAGE must come from images.lock.env}
    restart: unless-stopped
    networks: [runtime]
    # --console-address 固定控制台端口,否则每次启动随机端口,9001 映射失效。
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    ports:
      # 决策 2:UAT 期间 9000 绑测试网段供 Windows Client 直传;控制台保持 localhost。
      - "${MINIO_BIND_IP:-0.0.0.0}:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      # minio 镜像内置 curl(无 wget);/minio/health/live 为官方存活探针。
      test: [CMD-SHELL, "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  minio-init:
    image: ${MINIO_MC_IMAGE:?MINIO_MC_IMAGE must come from images.lock.env}
    networks: [runtime]
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-evidence}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set hermes http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        && mc mb --ignore-existing "hermes/$$MINIO_BUCKET"

networks:
  runtime:
    name: hermes-runtime
    driver: bridge
    ipam:
      config:
        # 显式固定网段:Docker 自动分配可能撞上内网真实设备(曾撞 172.22)。
        - subnet: ${RUNTIME_SUBNET:-172.31.240.0/24}

volumes:
  postgres-data:
    name: hermes-runtime-postgres
  minio-data:
    name: hermes-runtime-minio
